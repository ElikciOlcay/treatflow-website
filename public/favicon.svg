    fill="#ffffff"
    d="M14.2 9 H16.8 V19.2 Q16.8 20.5 15.5 21 Q14.2 20.2 14.2 19.2 Z"
  />
  <!-- Querstrich des "t" (kurz, oberhalb Mitte) -->
