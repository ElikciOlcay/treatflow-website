<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Abgerundeter Hintergrund (Squircle) #282828 -->
  <rect width="32" height="32" rx="7" ry="7" fill="#282828"/>
  <!-- Stamm des "t": links und oben gerade, unten geschwungen nach rechts -->
